<!DOCTYPE html>
<!-- 1! -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Imágenes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>Galería de Imágenes</h1>
    <div class="gallery">
        <img src="paisaje-digital-en-atardecer-5846.jpg" alt="paisaje digital en el atardecer">
        <title>paisaje digital en el atardecer</title>
            <srcet="paisaje-digital-en-atardecer-5846.jpg"  >
        <height="400"  width="600"></height>
        <img src="Paisaje jo.jpg" alt="paisaje digital menos detallada">
        <Section>
        <picture>

             <source media="(width >= 1200px)" 
             srcset="image/paaisaje-digital-en-atardecer-5846.jpg">
             <source media="(width >=700px)" 
             srcset="image/paisajeNormal.jpg">
             <img src="imagenes/Paisaje-jo.jpg" alt="imagen">
        </picture>

        </Section>
        <img src="imagen3.jpg" alt="Descripción paisaje 3">
    </div>
</body>
</html>
